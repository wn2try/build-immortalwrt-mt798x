name: Build ImmortalWrt for X30E Pro

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs: 
      repo_name:
        description: ImmortalWrt repository name 
        default: wn2try/immortalwrt-mt798x-rebase
        required: true
      branch_name:
        description: Branch name with the repository
        default: 25.12
        required: true
      defconfig:
        description: Defconfig file to use
        default: mt7981-ruijie-x30e-pro_defconfig
        required: true

jobs:
  Build-ImmortalWrt:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v6

    - name: Setup dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl

    - name: Clone the source code
      run: |
        git clone -b ${{ inputs.branch_name }} --single-branch --filter=blob:none \
        https://github.com/${{ inputs.repo_name }}.git immortalwrt

        cd immortalwrt

    - name: Update the feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Create configuration
      run: |
        cp ../defconfig/${{ inputs.defconfig }} .config
        if ! grep -q "CONFIG_SDK=y" .config; then
          echo "Note: the SDK will be built"
          echo "sdk=true" >> $GITHUB_ENV
        else
          echo "Note: the SDK will not be built"
          echo "sdk=false" >> $GITHUB_ENV
        fi

        make defconfig

    - name: Download source files
      run: |
        make download -j$(nproc)

    - name: Install tools and build toolchain
      run: |
        make tools/install -j$(nproc)
        make toolchain/install -j$(nproc)

    - name: Build kernel first
      run: |
        make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s

    # - name: Build ipk with -j1
    #   run: |
    #     if [ -e package/mtk/libs/openssl1.1/Makefile ]; then
    #       echo "Compiling openssl1.1 with -j1"
    #       make package/mtk/libs/openssl1.1/compile -j1 V=s
    #     else
    #       echo "WARNING: Makefile for openssl1.1 does not exist"
    #     fi

    - name: Build the firmware image 
      run: |
        make -j$(nproc) || make -j1 V=s
        echo "sdkfile=bin/targets/mediatek/filogic/*-sdk-*.tar.*" >> $GITHUB_ENV

    - name: Upload the SDK
      if: ${{ env.sdk == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: x30e-pro-sdk
        overwrite: true
        compression-level: 0
        if-no-files-found: warn
        retention-days: 4
        path: ${{ env.sdkfile }}

    - name: Remove the SDK file from firmware directory
      if: ${{ env.sdk == 'true' }}
      run: |
        sdkfile=${{ env.sdkfile }}
        if [ -e ${sdkfile} ]; then
          rm ${sdkfile}
          echo "SDK file removed: ${sdkfile}"
        else
          echo "ERROR: SDK file does not exist ${sdkfile}"
        fi

    - name: Upload the firmware and kmods
      uses: actions/upload-artifact@v7
      with:
        name: x30e-pro-firmware
        overwrite: true
        retention-days: 4
        path: bin/targets/mediatek/filogic/*
