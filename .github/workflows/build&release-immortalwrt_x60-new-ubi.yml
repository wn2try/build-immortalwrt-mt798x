name: X60 New (UBI) - ImmortalWrt Build & Release

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs: 
      repo:
        description: ImmortalWrt repository 
        default: chasey-dev/immortalwrt-mt798x-rebase
        required: true
      branch:
        description: Branch with the repository
        default: 25.12
        required: true

jobs:
  Build-and-Release-ImmortalWrt:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout external repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repo }}
        ref: ${{ inputs.branch }}

    - name: Checkout this repository
      uses: actions/checkout@v6
      with:
        path: myrepo

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl

    - name: Update the feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Make firmware configurations & copy user files
      run: |
        cp -r myrepo/files ./
        cp myrepo/diffconfig/mt7986-ruijie-x60-new-ubi+sdk_diffconfig .config
        make defconfig
        ls -la

    - name: Download source files
      run: |
        make download -j$(nproc)

    - name: Build tools and toolchain
      run: |
        make tools/install -j$(nproc)
        make toolchain/install -j$(nproc)

    - name: Build kernel first
      run: |
        make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s

    # - name: Build apk with -j1
    #   run: |
    #     if [ -e package/mtk/libs/openssl1.1/Makefile ]; then
    #       echo "Compiling openssl1.1 with -j1"
    #       make package/mtk/libs/openssl1.1/compile -j1 V=s
    #     else
    #       echo "WARNING: Makefile for openssl1.1 does not exist"
    #     fi

    - name: Build firmware image and SDK
      run: |
        make -j$(nproc) || make -j1 V=s

    - name: Create release artifacts - system firmware and SDK tarball
      run: |
        mkdir release
        mv bin/targets/mediatek/filogic/*-sdk-*.tar.* release/
        tar -czf release/immortalwrt-25.12-snapshot-x60-new-ubi.tar.gz -C bin/targets/mediatek/filogic/ .
      
        imowrtver=$(jq ".version_number" bin/targets/mediatek/filogic/profiles.json | tr -d '"')
        echo "IMOWRT_VER=$imowrtver" >> $GITHUB_ENV
        
        kernelver=$(jq ".packages.kernel" bin/targets/mediatek/filogic/packages/index.json | tr -d '"')
        echo "KERNEL_VER=$kernelver" >> $GITHUB_ENV
        
        srctime=$(jq ".source_date_epoch" bin/targets/mediatek/filogic/profiles.json)
        releasetag=$(date -d "@$srctime" +"%Y%m%dT%H%M")
        echo "RELEASE_TAG=$releasetag" >> $GITHUB_ENV

    - name: Create release artifacts - initramfs image for first installation
      run: |
        cp myrepo/initramfs/mt7986a-ruijie-rg-x60-new-ubi.dts target/linux/mediatek/dts-ext/
        make target/linux/clean
        make -j$(nproc) || make -j1 V=s

        mv bin/targets/mediatek/filogic/*-initramfs-*.itb \
        bin/immortalwrt-25.12-snapshot-x60-new-ubi-initramfs_first-install.itb
        tar -czf release/immortalwrt-25.12-snapshot-x60-new-ubi-initramfs_first-install.tar.gz \
        -C bin/ immortalwrt-25.12-snapshot-x60-new-ubi-initramfs_first-install.itb

        ls -l release/

    - name: Release artifacts
      uses: ncipollo/release-action@v1
      with:
        tag: ${{env.RELEASE_TAG}}_X60-New-UBI
        allowUpdates: true
        artifacts: ./release/*
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          - ImmortalWrt: `${{env.IMOWRT_VER}}`
          - Kernel: `${{env.KERNEL_VER}}`
          - Default IP: `192.168.1.1`

          <br>

          immortalwrt-25.12-snapshot-x60-new-ubi-initramfs_first-install.itb
          - use this one for the first installation if the relevant UBI volumes are not created yet.
