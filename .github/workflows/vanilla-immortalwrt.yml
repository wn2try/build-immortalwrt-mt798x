name:  Vanilla ImmortalWrt ~ X60 New / X30E Pro - UBI

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs: 
      variant:
        description: ImmortalWrt or OpenWrt 
        default: immortalwrt
        required: true
      openwrtver:
        description: Version Number (snapshot/25.12.0)
        default: snapshot
        required: true
      model:
        description: Device Model
        default: x60-new-ubi
        required: true
      vendor:
        description: Device Vendor
        default: ruijie
        required: true
      pkgadd:
        description: Packages to Add
        default: htop nano luci-app-upnp luci-i18n-upnp-zh-cn luci-app-dufs luci-i18n-dufs-zh-cn luci-i18n-firewall-zh-cn luci-i18n-package-manager-zh-cn
        required: false
      pkgremove:
        description: Packages to Remove
        default: 
        required: false

jobs:
  Build-and-Release-ImmortalWrt:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt -qy update
        sudo apt install -qy build-essential libncurses5-dev zlib1g-dev \
        file wget gawk git gettext libssl-dev xsltproc rsync unzip \
        python3 python3-setuptools u-boot-tools

    - name: Execute the script to build images
      run: |
        echo "export input variables..."
        export variant=${{inputs.variant}} openwrtver=${{inputs.openwrtver}} \
          model=${{inputs.model}} vendor=${{inputs.vendor}} \
          pkgadd=${{inputs.pkgadd}} pkgremove=${{inputs.pkgremove}}

        echo "run script..."
        cd vanilla
        chmod +x mkimg.sh
        ./mkimg.sh

    - name: Create release variables
      run: |
        cd vanilla/release

        imowrtver=$(jq ".version_number" profiles.json | tr -d '"')
        echo "IMOWRT_VER=$imowrtver" | tee -a $GITHUB_ENV
        vercode=$(jq ".version_code" profiles.json | tr -d '"')
        echo "VER_CODE=$vercode" | tee -a $GITHUB_ENV

        kernelver=$(grep "kernel" *.manifest | cut -d' ' -f3)
        echo "KERNEL_VER=$kernelver" | tee -a $GITHUB_ENV

        releasetag=$(date +"%Y%m%dT%H%M")_${{inputs.model}}
        echo "RELEASE_TAG=$releasetag" | tee -a $GITHUB_ENV

    - name: Release artifacts
      uses: ncipollo/release-action@v1
      with:
        tag: ${{env.RELEASE_TAG}}
        allowUpdates: true
        artifacts: vanilla/release/*
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          - ImmortalWrt: `${{env.IMOWRT_VER}} ~ ${{env.VER_CODE}}`
          - Kernel: `${{env.KERNEL_VER}}`
          - Default IP: `192.168.1.1`
